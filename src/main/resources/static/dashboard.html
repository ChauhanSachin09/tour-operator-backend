<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TourOperator Dashboard</title>
  <style>
    :root {
      --bg-deep: #0f172a;
      --bg-card: #1e293b;
      --accent-indian: #f59e0b;
      --accent-indian-dim: rgba(245,158,11,0.18);
      --accent-indian-border: rgba(245,158,11,0.28);
      --accent-intl: #38bdf8;
      --accent-intl-dim: rgba(56,189,248,0.18);
      --accent-intl-border: rgba(56,189,248,0.28);
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border: rgba(255,255,255,0.07);
      --grad-indian: linear-gradient(135deg, rgba(245,158,11,0.13) 0%, rgba(217,119,6,0.06) 100%);
      --grad-intl: linear-gradient(135deg, rgba(56,189,248,0.13) 0%, rgba(2,132,199,0.06) 100%);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 60% 50% at 15% 60%, rgba(245,158,11,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 15%, rgba(56,189,248,0.06) 0%, transparent 60%);
    }

    /* HEADER */
    header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25rem 2.5rem;
      background: rgba(15,23,42,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .logo { display: flex; align-items: center; gap: 0.875rem; }

    .logo-plane {
      font-size: 2rem; line-height: 1;
      filter: drop-shadow(0 0 14px rgba(245,158,11,0.7));
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0) rotate(-5deg); }
      50%      { transform: translateY(-4px) rotate(5deg); }
    }

    .logo-copy { display: flex; flex-direction: column; gap: 0.1rem; }

    .logo-name {
      font-size: 1.45rem; font-weight: 900; letter-spacing: -0.04em; line-height: 1;
      background: linear-gradient(110deg, #f59e0b 0%, #fbbf24 40%, #38bdf8 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .logo-tagline {
      font-size: 0.65rem; text-transform: uppercase;
      letter-spacing: 0.12em; color: var(--text-muted);
    }

    .header-clock { text-align: right; }

    .clock-time {
      font-size: 1.5rem; font-weight: 700; letter-spacing: -0.03em;
      font-variant-numeric: tabular-nums; color: var(--text-primary); line-height: 1;
    }

    .clock-date {
      font-size: 0.7rem; color: var(--text-muted);
      letter-spacing: 0.06em; margin-top: 0.2rem;
    }

    /* MAIN */
    main { max-width: 1440px; margin: 0 auto; padding: 2.5rem 2.5rem 1rem; }

    /* STATS BAR */
    .stats-bar { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }

    .stat-pill {
      display: flex; align-items: center; gap: 1rem;
      padding: 0.875rem 1.5rem; border-radius: 999px;
      border: 1px solid var(--border); background: rgba(255,255,255,0.03);
    }

    .stat-pill.total  { border-color: rgba(148,163,184,0.18); }
    .stat-pill.indian { border-color: var(--accent-indian-border); }
    .stat-pill.intl   { border-color: var(--accent-intl-border); }

    .stat-num { font-size: 2rem; font-weight: 900; letter-spacing: -0.05em; line-height: 1; }

    .stat-pill.total  .stat-num { color: var(--text-primary); }
    .stat-pill.indian .stat-num { color: var(--accent-indian); }
    .stat-pill.intl   .stat-num { color: var(--accent-intl); }

    .stat-meta { display: flex; flex-direction: column; }
    .stat-meta .label    { font-size: 0.625rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-muted); }
    .stat-meta .sublabel { font-size: 0.8rem; color: var(--text-secondary); font-weight: 500; }

    /* FILTER TABS */
    .filter-bar {
      display: flex; gap: 0.375rem; margin-bottom: 2rem;
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      border-radius: 10px; padding: 0.3rem; width: fit-content;
    }

    .ftab {
      padding: 0.5rem 1.25rem; border-radius: 7px; border: none;
      background: transparent; color: var(--text-muted);
      font-size: 0.825rem; font-weight: 600; cursor: pointer;
      transition: background 0.18s, color 0.18s; letter-spacing: 0.02em;
    }

    .ftab:hover { color: var(--text-primary); background: rgba(255,255,255,0.06); }
    .ftab.active           { color: var(--text-primary); background: rgba(255,255,255,0.09); }
    .ftab.active.f-indian  { color: var(--accent-indian); background: var(--accent-indian-dim); }
    .ftab.active.f-intl    { color: var(--accent-intl);   background: var(--accent-intl-dim); }

    /* CARDS GRID */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.25rem; }

    .card {
      position: relative; border-radius: 16px;
      border: 1px solid var(--border); padding: 1.5rem;
      background: var(--bg-card); overflow: hidden; cursor: default;
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card::before {
      content: ''; position: absolute; inset: 0; pointer-events: none;
    }
    .card.indian::before { background: var(--grad-indian); }
    .card.intl::before   { background: var(--grad-intl); }

    .card:hover { transform: translateY(-5px); }
    .card.indian:hover {
      border-color: var(--accent-indian-border);
      box-shadow: 0 22px 44px rgba(245,158,11,0.14), 0 4px 12px rgba(0,0,0,0.5);
    }
    .card.intl:hover {
      border-color: var(--accent-intl-border);
      box-shadow: 0 22px 44px rgba(56,189,248,0.14), 0 4px 12px rgba(0,0,0,0.5);
    }
    .card.hidden { display: none; }

    /* Badge */
    .badge {
      position: absolute; top: 1rem; right: 1rem;
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; padding: 0.22rem 0.6rem;
      border-radius: 999px; z-index: 1;
    }
    .card.indian .badge { background: var(--accent-indian-dim); color: var(--accent-indian); border: 1px solid var(--accent-indian-border); }
    .card.intl   .badge { background: var(--accent-intl-dim);   color: var(--accent-intl);   border: 1px solid var(--accent-intl-border); }

    /* Card body */
    .card-body { position: relative; z-index: 1; }
    .city { font-size: 1.45rem; font-weight: 800; letter-spacing: -0.035em; line-height: 1.1; padding-right: 5rem; }
    .price-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-muted); margin-top: 1.1rem; }
    .price { font-size: 1.05rem; font-weight: 700; margin-top: 0.2rem; letter-spacing: -0.01em; }
    .card.indian .price { color: var(--accent-indian); }
    .card.intl   .price { color: var(--accent-intl); }
    .divider { height: 1px; background: var(--border); margin: 1.1rem 0; }

    .chip {
      display: inline-flex; align-items: center; gap: 0.4rem;
      font-size: 0.72rem; font-weight: 500; color: var(--text-secondary);
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      border-radius: 6px; padding: 0.25rem 0.65rem;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .card.indian .dot { background: var(--accent-indian); }
    .card.intl   .dot { background: var(--accent-intl); }

    /* Empty state */
    .empty { grid-column: 1/-1; text-align: center; padding: 5rem 2rem; color: var(--text-muted); }
    .empty-icon { font-size: 3rem; margin-bottom: 0.75rem; }
    .empty p { font-size: 0.9rem; }

    /* Footer */
    footer {
      text-align: center; padding: 2rem; color: var(--text-muted);
      font-size: 0.72rem; letter-spacing: 0.06em;
      border-top: 1px solid var(--border); margin-top: 3rem;
    }
    footer em { font-style: normal; color: var(--accent-indian); }

    @media (max-width: 600px) {
      header { flex-direction: column; gap: 1rem; padding: 1rem 1.25rem; }
      .header-clock { text-align: center; }
      main { padding: 1.5rem 1.25rem 1rem; }
      .stats-bar { flex-direction: column; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-plane">✈</span>
    <div class="logo-copy">
      <span class="logo-name">TourOperator</span>
      <span class="logo-tagline">Discover the World, One Package at a Time</span>
    </div>
  </div>
  <div class="header-clock">
    <div class="clock-time" id="js-time"></div>
    <div class="clock-date" id="js-date"></div>
  </div>
</header>

<main>
  <div class="stats-bar">
    <div class="stat-pill total">
      <span class="stat-num" id="s-total">0</span>
      <div class="stat-meta"><span class="label">Destinations</span><span class="sublabel">Total Available</span></div>
    </div>
    <div class="stat-pill indian">
      <span class="stat-num" id="s-indian">0</span>
      <div class="stat-meta"><span class="label">🇮🇳 Indian</span><span class="sublabel">Domestic Packages</span></div>
    </div>
    <div class="stat-pill intl">
      <span class="stat-num" id="s-intl">0</span>
      <div class="stat-meta"><span class="label">🌍 International</span><span class="sublabel">Global Packages</span></div>
    </div>
  </div>

  <div class="filter-bar">
    <button class="ftab active f-all"  onclick="applyFilter('all',this)">All</button>
    <button class="ftab f-indian"      onclick="applyFilter('indian',this)">Indian 🇮🇳</button>
    <button class="ftab f-intl"        onclick="applyFilter('intl',this)">International 🌍</button>
  </div>

  <div class="grid" id="grid"></div>
</main>

<footer>
  Powered by <em>TourOperator Research Skill</em> &nbsp;·&nbsp; Data auto-updated on every research run
</footer>

<script>
  // Auto-injected by /research-tourOperator — do not edit manually
  const DESTINATIONS = [
    {"name":"Goa","price":"₹20,000 – ₹35,000","contact":"MakeMyTrip"},
    {"name":"Kerala","price":"₹22,000 – ₹47,000","contact":"TravelTriangle"},
    {"name":"Rajasthan","price":"₹45,000 – ₹85,000","contact":"Yatra"},
    {"name":"Manali","price":"₹15,000 – ₹25,000","contact":"Yatra"},
    {"name":"Andaman","price":"₹25,000 – ₹60,000","contact":"Thomas Cook India"},
    {"name":"Paris","price":"$1,500 – $2,500","contact":"Expedia"},
    {"name":"Bali","price":"$1,200 – $1,500","contact":"Travelocity"},
    {"name":"Dubai","price":"$1,200 – $2,000","contact":"Expedia"},
    {"name":"Pune","price":"₹15,000 – ₹25,000","contact":"Thrillophilia"},
    {"name":"Mumbai","price":"₹17,800 – ₹21,320","contact":"MakeMyTrip"}
  ];

  const INDIAN_SET = new Set([
    'goa','kerala','manali','shimla','ooty','coorg','munnar','darjeeling',
    'leh','ladakh','andaman','rajasthan','jaisalmer','jaipur','udaipur',
    'agra','varanasi','rishikesh','mysore','hampi','kodaikanal','spiti',
    'nainital','mussoorie','jim corbett','ranthambore','mahabaleshwar',
    'lonavala','pondicherry','amritsar','kochi','hyderabad','kolkata',
    'mumbai','delhi','bangalore','chennai','pune'
  ]);

  const isIndian = n => INDIAN_SET.has(n.toLowerCase().trim());

  // Clock
  function tick() {
    const now = new Date();
    document.getElementById('js-time').textContent =
      now.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    document.getElementById('js-date').textContent =
      now.toLocaleDateString('en-IN', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
  }
  tick(); setInterval(tick, 1000);

  // Render
  function render() {
    const grid = document.getElementById('grid');
    if (!DESTINATIONS.length) {
      grid.innerHTML = `<div class="empty"><div class="empty-icon">🗺️</div><p>No destinations yet — run /research-tourOperator to populate the dashboard.</p></div>`;
      return;
    }
    let nI = 0, nX = 0;
    grid.innerHTML = DESTINATIONS.map((d, i) => {
      const ind = isIndian(d.name);
      ind ? nI++ : nX++;
      const t = ind ? 'indian' : 'intl';
      return `
        <div class="card ${t}" data-type="${t}" style="animation-delay:${i*0.05}s">
          <span class="badge">${ind ? '🇮🇳 Indian' : '🌍 Intl'}</span>
          <div class="card-body">
            <div class="city">${d.name}</div>
            <div class="price-label">Mid-Range · Per Person</div>
            <div class="price">${d.price}</div>
            <div class="divider"></div>
            <span class="chip"><span class="dot"></span>Book via ${d.contact}</span>
          </div>
        </div>`;
    }).join('');
    document.getElementById('s-total').textContent  = DESTINATIONS.length;
    document.getElementById('s-indian').textContent = nI;
    document.getElementById('s-intl').textContent   = nX;
  }

  // Filter
  function applyFilter(type, btn) {
    document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.card').forEach(c =>
      c.classList.toggle('hidden', type !== 'all' && c.dataset.type !== type)
    );
  }

  render();
</script>
</body>
</html>
